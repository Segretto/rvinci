defaults:
  - hydra: default
  - _self_

project:
  name: imitation_control
  runs_root: runs
  notes: "Spot control pipeline combining DINOv3 feature extractors with a regression PoseFusion head."

skills:
  enabled:
    - perception.dinov3
    - manipulation.imitation
  dinov3:
    image_size: 640
    fp16: true
    weights_path: "models/dinov3_vits16plus.pth"
  imitation:
    query_dim: 256
    proprio_dim: 7
    hidden_dim: 256
    output_quaternion: true

# These MUST be supplied via command line e.g. `hostname=192.168.80.3 model_path=weights.pth bottleneck_path=bottleneck.json`
hostname: "???"
model_path: "???"
bottleneck_path: "???"
sleep_freq: 0.1
